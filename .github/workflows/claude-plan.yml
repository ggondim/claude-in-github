# =============================================================================
# Claude Plan Agent
# =============================================================================
#
# PURPOSE
# -------
# Turns a feature request / problem description into a ready-to-run meta issue
# via a short iterative conversation on the issue:
#
#   First pass (Questions Mode)
#     If the agent is unsure, it posts a numbered questions comment and stops.
#     The human answers in new comments, re-mentions @plan-agent, the agent
#     sees the full conversation and can now produce a plan.
#
#   First pass (Plan Mode)
#     The plan agent designs the plan; the splitter extracts task specs; a
#     deterministic bash step creates task issues, substitutes placeholders
#     with real numbers, updates the issue body, labels `meta`+`draft`, and
#     assigns the commenter.
#
#   Revision
#     The human comments change requests on a `meta+draft` issue and mentions
#     @plan-agent again. The agent sees conversation.md (current plan +
#     existing task bodies + recent comments). To preserve a task, it uses
#     its real issue number in the YAML; to introduce one, it uses a fresh
#     Tn placeholder; to drop one, it omits the number. Bash reconciles
#     deterministically: integer refs → `gh issue edit` (only on content
#     change), Tn refs → `gh issue create`, dropped numbers → `gh issue
#     close`. No LLM diffing.
#
#   Approval
#     @claude on the meta issue kickstarts orchestration and removes `draft`.
#
# TRIGGER
# -------
# `@plan-agent` on an issue that is NOT a task (`priority:P*`) AND is either:
#   - not yet planned (no `meta` label) — first pass, or
#   - planned but still draft (`meta`+`draft`) — revision.
# Kickstarted plans (`meta` without `draft`) are blocked.
#
# DIRECTIVE SYNTAX (optional, in the comment)
# -------------------------------------------
#   @plan-agent [model] [reasoning]
#
# - model:     opus | sonnet | haiku                (default: opus)
# - reasoning: off | low | medium | high | max      (default: high)
#
# Examples:
#   @plan-agent                     → opus + high thinking
#   @plan-agent sonnet              → sonnet + high thinking
#   @plan-agent opus max            → opus + ultrathink
#   @plan-agent haiku off           → haiku, no extended thinking
#
# Reasoning is applied via Claude Code's magic phrases ("think hard",
# "think very hard", "ultrathink") injected into the plan agent prompt.
#
# IDENTITY CONVENTION
# -------------------
# A `ref` in the plan YAML / Progress / `### <ref> —` headings is either:
#   - a `Tn` placeholder → NEW task (bash creates it)
#   - a bare integer     → PRESERVED existing task (bash may edit it;
#                          closed on revision if it disappears from the plan)
# On first run the plan uses only Tn placeholders. On revision the plan
# agent chooses per task: reuse (integer) or introduce (Tn).
# After task creation, a single perl substitution rewrites `\bTn\b` → real
# number in both the YAML (`tasks: [T1]` → `[42]`) and the Progress line
# (`- [ ] #T1` → `- [ ] #42`). Integers in the plan pass through unchanged.
#
# TIMEOUT: 30 minutes
# =============================================================================

name: Claude Plan Agent

permissions:
  contents: read
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # First pass (no meta) OR revision (meta+draft). Task issues (priority:P*)
    # are always blocked. Kickstarted plans (meta without draft) are blocked.
    if: >
      github.event.issue.pull_request == null
      && contains(github.event.comment.body, '@plan-agent')
      && !contains(toJSON(github.event.issue.labels.*.name), 'priority:P')
      && (
        !contains(toJSON(github.event.issue.labels.*.name), 'meta')
        || contains(toJSON(github.event.issue.labels.*.name), 'draft')
      )

    steps:
      # --- Extract context + parse directive (model + reasoning) ---
      # Also determines whether this is a first-pass or a revision invocation
      # by checking the issue's current labels.
      - name: Extract context
        id: meta
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          COMMENTER: ${{ github.event.comment.user.login }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          DIRECTIVE=$(echo "$COMMENT_BODY" | grep -oE '@plan-agent.*' | head -1 || echo "@plan-agent")
          read -ra TOKENS <<< "$DIRECTIVE"

          MODEL="claude-opus-4-7"
          REASONING="high"

          for tok in "${TOKENS[@]:1}"; do
            # Lowercase (portable — avoids bash 4 ${tok,,}) and strip punctuation
            t=$(echo "$tok" | tr '[:upper:]' '[:lower:]' | tr -d ',.!?:;')
            case "$t" in
              opus)                    MODEL="claude-opus-4-7" ;;
              sonnet)                  MODEL="claude-sonnet-4-6" ;;
              haiku)                   MODEL="claude-haiku-4-5-20251001" ;;
              off|none|no-think)       REASONING="off" ;;
              low)                     REASONING="low" ;;
              med|medium)              REASONING="medium" ;;
              high)                    REASONING="high" ;;
              max|ultra|ultrathink)    REASONING="max" ;;
            esac
          done

          case "$REASONING" in
            off)    THINK_PHRASE="" ;;
            low)    THINK_PHRASE="Think before writing." ;;
            medium) THINK_PHRASE="Think hard before writing." ;;
            high)   THINK_PHRASE="Think very hard before writing." ;;
            max)    THINK_PHRASE="Ultrathink — take extensive time to reason before writing." ;;
          esac

          # Revision detection: both `meta` AND `draft` labels present means
          # the plan was already written and this invocation is a refinement.
          IS_REVISION="false"
          if echo "$ISSUE_LABELS" | grep -q '"meta"' && echo "$ISSUE_LABELS" | grep -q '"draft"'; then
            IS_REVISION="true"
          fi

          echo "Directive: model=$MODEL reasoning=$REASONING is_revision=$IS_REVISION"

          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "commenter=$COMMENTER" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "reasoning=$REASONING" >> "$GITHUB_OUTPUT"
          echo "think_phrase=$THINK_PHRASE" >> "$GITHUB_OUTPUT"
          echo "is_revision=$IS_REVISION" >> "$GITHUB_OUTPUT"

      # --- Checkout so the plan agent can explore the codebase ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Fetch the feature request body to a local file ---
      - name: Fetch issue body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
        run: |
          gh issue view "$ISSUE_NUM" --json title,body \
            --jq '"# " + .title + "\n\n" + .body' > /tmp/issue-request.md
          echo "--- Issue request ---"
          cat /tmp/issue-request.md
          echo "--- End ---"

      # --- Build revision context (only on re-invocations) ---
      # Gathers (1) current plan body, (2) existing task issues, (3) recent
      # comments into /tmp/conversation.md; writes /tmp/existing-tasks.json
      # for the splitter's reference. Also extracts the current YAML task
      # numbers into OLD_NUMBERS (carried via step output as a space-separated
      # string) so the reconciliation step can diff them.
      - name: Build revision context
        if: steps.meta.outputs.is_revision == 'true'
        id: revctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
        run: |
          set -euo pipefail

          # 1. Current plan body (what's in the meta issue right now)
          {
            echo "# Revision context"
            echo ""
            echo "## Current plan body"
            echo ""
            gh issue view "$ISSUE_NUM" --json body --jq '.body'
            echo ""
          } > /tmp/conversation.md

          # 2. Parse the current YAML block to extract existing task issue numbers
          CURRENT_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          YAML_BLOCK=$(echo "$CURRENT_BODY" | awk '/^```yaml[[:space:]]*$/{flag=1;next}/^```[[:space:]]*$/{flag=0}flag')

          OLD_NUMBERS=()
          if [[ -n "$YAML_BLOCK" ]]; then
            # Extract every integer from the `tasks:` arrays. yq returns them one per line.
            while IFS= read -r n; do
              [[ -n "$n" && "$n" =~ ^[0-9]+$ ]] && OLD_NUMBERS+=("$n")
            done < <(echo "$YAML_BLOCK" | yq '.waves[].tasks[]' 2>/dev/null | grep -E '^[0-9]+$' || true)
          fi

          echo "Existing task numbers: ${OLD_NUMBERS[*]:-<none>}"

          # 3. Build /tmp/existing-tasks.json and append each task to conversation.md
          {
            echo "## Existing task issues"
            echo ""
          } >> /tmp/conversation.md

          echo "[" > /tmp/existing-tasks.json
          first=true
          for num in "${OLD_NUMBERS[@]}"; do
            TITLE=$(gh issue view "$num" --json title --jq '.title' 2>/dev/null || echo "")
            BODY=$(gh issue view "$num" --json body --jq '.body' 2>/dev/null || echo "")
            if [[ -z "$TITLE" ]]; then
              echo "::warning::Task #$num referenced in plan but not fetchable — skipping"
              continue
            fi

            {
              echo "### Task #$num — $TITLE"
              echo ""
              echo "$BODY"
              echo ""
              echo "---"
              echo ""
            } >> /tmp/conversation.md

            if $first; then first=false; else echo "," >> /tmp/existing-tasks.json; fi
            jq -n --argjson n "$num" --arg t "$TITLE" --arg b "$BODY" \
              '{number: $n, title: $t, body: $b}' >> /tmp/existing-tasks.json
          done
          echo "]" >> /tmp/existing-tasks.json

          # 4. Recent comments (human feedback / answers / revision requests)
          {
            echo "## Recent comments (chronological)"
            echo ""
            gh api "repos/$REPO/issues/$ISSUE_NUM/comments" \
              --jq '[.[] | {author: .user.login, body: .body}] | .[-20:] | .[] | "### " + .author + "\n\n" + .body + "\n\n---\n"' \
              || echo "(could not fetch comments)"
          } >> /tmp/conversation.md

          echo "--- conversation.md (first 200 lines) ---"
          head -200 /tmp/conversation.md
          echo "--- existing-tasks.json ---"
          cat /tmp/existing-tasks.json
          echo "--- End ---"

          # Carry OLD_NUMBERS to the reconciliation step as a space-separated string
          echo "old_numbers=${OLD_NUMBERS[*]}" >> "$GITHUB_OUTPUT"

      # --- Load prompts from .github/prompts/ into env vars ---
      - name: Load prompts
        env:
          THINK_PHRASE: ${{ steps.meta.outputs.think_phrase }}
        run: |
          DELIM="___CLAUDE_PROMPT_EOF___"

          # Plan agent — substitute {{THINK_PHRASE}}
          PLAN=$(cat .github/prompts/plan-agent.md)
          PLAN="${PLAN//\{\{THINK_PHRASE\}\}/$THINK_PHRASE}"
          {
            echo "PLAN_PROMPT<<$DELIM"
            printf '%s\n' "$PLAN"
            echo "$DELIM"
          } >> "$GITHUB_ENV"

          # Splitter agent — no placeholders
          {
            echo "SPLITTER_PROMPT<<$DELIM"
            cat .github/prompts/splitter-agent.md
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      # --- Agent 1: Plan Agent (model + reasoning from directive) ---
      - name: Run Plan Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model ${{ steps.meta.outputs.model }} --allowedTools Read,Glob,Grep,Write"
          allowed_bots: "claude[bot],github-actions[bot]"
          prompt: ${{ env.PLAN_PROMPT }}

      # --- Detect Questions Mode and short-circuit if the agent only asked ---
      # Contract: the plan agent writes EITHER /tmp/plan-body.md (Plan Mode)
      # OR /tmp/questions.md (Questions Mode). Emitting both is a prompt
      # violation and fails. Emitting neither also fails.
      - name: Detect Questions Mode
        id: mode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
          COMMENTER: ${{ steps.meta.outputs.commenter }}
        run: |
          set -euo pipefail
          HAS_PLAN="false"; HAS_Q="false"
          [[ -s /tmp/plan-body.md ]] && HAS_PLAN="true"
          [[ -s /tmp/questions.md ]] && HAS_Q="true"

          if [[ "$HAS_PLAN" == "true" && "$HAS_Q" == "true" ]]; then
            echo "::error::Plan agent wrote BOTH /tmp/plan-body.md and /tmp/questions.md — prompt violation."
            exit 1
          fi

          if [[ "$HAS_PLAN" == "false" && "$HAS_Q" == "false" ]]; then
            echo "::error::Plan agent produced neither /tmp/plan-body.md nor /tmp/questions.md."
            exit 1
          fi

          if [[ "$HAS_Q" == "true" ]]; then
            echo "Questions Mode: posting questions comment and stopping."
            QBODY=$(cat /tmp/questions.md)
            gh issue comment "$ISSUE_NUM" --body "🤔 **Plan agent has questions before writing the plan.**

          $QBODY

          @$COMMENTER — please reply to these in new comments, then re-mention \`@plan-agent\` (with or without a directive) and I'll pick up the thread."
            echo "mode=questions" >> "$GITHUB_OUTPUT"
          else
            echo "Plan Mode: continuing to splitter."
            echo "mode=plan" >> "$GITHUB_OUTPUT"
          fi

      # --- Agent 2: Splitter (Sonnet) ---
      - name: Run Splitter Agent
        if: steps.mode.outputs.mode == 'plan'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --allowedTools Read,Write"
          allowed_bots: "claude[bot],github-actions[bot]"
          prompt: ${{ env.SPLITTER_PROMPT }}

      # --- Deterministic reconciliation: create / update / close tasks ---
      # Reconciliation is driven entirely by each task's `ref` field:
      #   ref is an integer  → preserved → `gh issue edit` (only if content changed)
      #   ref is `Tn` string → new       → `gh issue create`
      # Any integer present in OLD_NUMBERS but absent from the new YAML
      # (tracked in NEW_NUMBERS) gets closed with a "superseded" comment.
      - name: Reconcile task issues and finalize meta
        if: steps.mode.outputs.mode == 'plan'
        id: finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
          COMMENTER: ${{ steps.meta.outputs.commenter }}
          REPO: ${{ github.repository }}
          IS_REVISION: ${{ steps.meta.outputs.is_revision }}
          OLD_NUMBERS_STR: ${{ steps.revctx.outputs.old_numbers }}
        run: |
          set -euo pipefail

          [[ -s /tmp/plan-body.md ]]  || { echo "::error::Plan agent produced no plan"; exit 1; }
          [[ -s /tmp/tasks.jsonl ]]   || { echo "::error::Splitter produced no tasks"; exit 1; }

          echo "--- Plan body ---"
          cat /tmp/plan-body.md
          echo "--- Tasks JSONL ---"
          cat /tmp/tasks.jsonl
          echo "--- End ---"

          # Validate JSONL
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            echo "$line" | jq -e . >/dev/null || { echo "::error::Invalid JSONL line: $line"; exit 1; }
          done < /tmp/tasks.jsonl

          # Collect NEW_NUMBERS = integers that appear in the new plan YAML.
          YAML_BLOCK=$(awk '/^```yaml[[:space:]]*$/{flag=1;next}/^```[[:space:]]*$/{flag=0}flag' /tmp/plan-body.md)
          NEW_NUMBERS=()
          if [[ -n "$YAML_BLOCK" ]]; then
            while IFS= read -r n; do
              [[ "$n" =~ ^[0-9]+$ ]] && NEW_NUMBERS+=("$n")
            done < <(echo "$YAML_BLOCK" | yq '.waves[].tasks[]' 2>/dev/null | grep -E '^[0-9]+$' || true)
          fi

          # OLD_NUMBERS from the revision-context step (empty on first run).
          read -ra OLD_NUMBERS <<< "${OLD_NUMBERS_STR:-}"

          echo "OLD numbers: ${OLD_NUMBERS[*]:-<none>}"
          echo "NEW numbers: ${NEW_NUMBERS[*]:-<none>}"

          # Counters for the reply variant
          CREATED=0
          UPDATED=0
          UNCHANGED=0
          CLOSED=0

          : > /tmp/sub-map.txt

          # Walk the splitter output and dispatch on ref type.
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            REF=$(echo "$line" | jq -r '.ref')
            TITLE=$(echo "$line" | jq -r '.title')
            BODY=$(echo "$line" | jq -r '.body')
            LABELS=$(echo "$line" | jq -r '.labels | join(",")')
            FULL_BODY=$(printf '%s\n\n---\n_Part of meta issue #%s._\n' "$BODY" "$ISSUE_NUM")

            if [[ "$REF" =~ ^[0-9]+$ ]]; then
              # Preserved: edit only if title or body actually changed.
              CUR=$(gh issue view "$REF" --repo "$REPO" --json title,body --jq '.title + "\u0001" + .body' 2>/dev/null || echo "")
              NEW="${TITLE}"$'\001'"${FULL_BODY}"
              if [[ "$CUR" != "$NEW" ]]; then
                TMP=$(mktemp)
                printf '%s' "$FULL_BODY" > "$TMP"
                gh issue edit "$REF" --repo "$REPO" --title "$TITLE" --body-file "$TMP"
                rm -f "$TMP"
                UPDATED=$((UPDATED + 1))
                echo "Updated #$REF ($TITLE)"
              else
                UNCHANGED=$((UNCHANGED + 1))
                echo "Unchanged #$REF"
              fi
            else
              # New task placeholder
              ARGS=(--repo "$REPO" --title "$TITLE" --body "$FULL_BODY")
              [[ -n "$LABELS" ]] && ARGS+=(--label "$LABELS")
              URL=$(gh issue create "${ARGS[@]}")
              NUM=$(echo "$URL" | grep -oP '\d+$')
              echo "$REF=$NUM" >> /tmp/sub-map.txt
              CREATED=$((CREATED + 1))
              echo "Created $REF → #$NUM ($TITLE)"
            fi
          done < /tmp/tasks.jsonl

          # Close tasks that disappeared from the plan (OLD − NEW).
          if [[ ${#OLD_NUMBERS[@]} -gt 0 ]]; then
            DROPPED=$(comm -23 \
              <(printf '%s\n' "${OLD_NUMBERS[@]}" | sort -u) \
              <(printf '%s\n' "${NEW_NUMBERS[@]:-}" | sort -u) || true)
            while IFS= read -r d; do
              [[ -z "$d" ]] && continue
              gh issue close "$d" --repo "$REPO" \
                --comment "Superseded by revised plan on #$ISSUE_NUM" \
                && CLOSED=$((CLOSED + 1)) && echo "Closed #$d"
            done <<< "$DROPPED"
          fi

          # Sanity: first run must have at least created something.
          if [[ "$IS_REVISION" != "true" && "$CREATED" -eq 0 ]]; then
            echo "::error::First-run plan produced zero new tasks"
            exit 1
          fi

          # Substitute Tn placeholders (only ones we just created) in the plan body.
          # Integers pass through unchanged — they don't match \bTn\b.
          if [[ -s /tmp/sub-map.txt ]]; then
            perl - /tmp/plan-body.md /tmp/sub-map.txt > /tmp/final-body.md <<'PERL'
          my ($src, $map_file) = @ARGV;
          my %map;
          open(my $m, "<", $map_file) or die "map: $!";
          while (<$m>) {
            chomp;
            next unless /^(\S+?)=(\S+)$/;
            $map{$1} = $2;
          }
          close($m);
          # Apply longer placeholders first (T10 before T1) as defensive ordering
          my @keys = sort { length($b) <=> length($a) || $b cmp $a } keys %map;
          open(my $f, "<", $src) or die "src: $!";
          while (my $line = <$f>) {
            for my $ph (@keys) {
              my $num = $map{$ph};
              $line =~ s/\b\Q$ph\E\b/$num/g;
            }
            print $line;
          }
          close($f);
          PERL
          else
            # No new tasks to substitute — just copy.
            cp /tmp/plan-body.md /tmp/final-body.md
          fi

          # Strip the staging `## Tasks` section — everything from `## Tasks` up to
          # (but not including) the next `## ` heading.
          awk '
            /^## Tasks[[:space:]]*$/ { skip=1; next }
            /^## / && skip          { skip=0 }
            !skip
          ' /tmp/final-body.md > /tmp/meta-body.md

          echo "--- Final meta issue body ---"
          cat /tmp/meta-body.md
          echo "--- End ---"

          # Update the issue body (always).
          gh issue edit "$ISSUE_NUM" --body-file /tmp/meta-body.md

          # First-pass-only work: labels + assignee.
          if [[ "$IS_REVISION" != "true" ]]; then
            gh label create draft --color "CCCCCC" \
              --description "Plan drafted but not yet kickstarted" 2>/dev/null || true
            gh issue edit "$ISSUE_NUM" --add-label meta --add-label draft
            gh issue edit "$ISSUE_NUM" --add-assignee "$COMMENTER" \
              || echo "::warning::Could not assign @$COMMENTER (missing repo access?)"
          fi

          echo "created=$CREATED"     >> "$GITHUB_OUTPUT"
          echo "updated=$UPDATED"     >> "$GITHUB_OUTPUT"
          echo "unchanged=$UNCHANGED" >> "$GITHUB_OUTPUT"
          echo "closed=$CLOSED"       >> "$GITHUB_OUTPUT"

      # --- Reply to the commenter (Plan Mode only — Questions Mode already replied) ---
      - name: Reply to commenter
        if: success() && steps.mode.outputs.mode == 'plan'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
          COMMENTER: ${{ steps.meta.outputs.commenter }}
          IS_REVISION: ${{ steps.meta.outputs.is_revision }}
          MODEL: ${{ steps.meta.outputs.model }}
          REASONING: ${{ steps.meta.outputs.reasoning }}
          CREATED: ${{ steps.finalize.outputs.created }}
          UPDATED: ${{ steps.finalize.outputs.updated }}
          UNCHANGED: ${{ steps.finalize.outputs.unchanged }}
          CLOSED: ${{ steps.finalize.outputs.closed }}
        run: |
          if [[ "$IS_REVISION" == "true" ]]; then
            gh issue comment "$ISSUE_NUM" --body "@$COMMENTER — Plan revised. **${CREATED}** created, **${UPDATED}** updated, **${UNCHANGED}** unchanged, **${CLOSED}** closed.

          _Revised with \`${MODEL}\` at reasoning \`${REASONING}\`._

          **Next step:** re-review the plan above. Comment \`@claude\` to kickstart, or mention \`@plan-agent\` again for another revision."
          else
            gh issue comment "$ISSUE_NUM" --body "@$COMMENTER — Plan ready. Created **${CREATED}** task issues; this issue is labeled \`meta\`/\`draft\` and assigned to you.

          _Planned with \`${MODEL}\` at reasoning \`${REASONING}\`._

          **Next step:** review the plan in the issue body above. When you're ready, comment \`@claude\` on this issue to kickstart the orchestration loop. (Or mention \`@plan-agent\` again with change requests to revise.)"
          fi

      # --- Failure notification ---
      - name: Notify failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
          COMMENTER: ${{ steps.meta.outputs.commenter }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUM" --body "@$COMMENTER — ⚠️ **Plan agent failed.** [View logs](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})"
