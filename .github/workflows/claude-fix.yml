# =============================================================================
# Claude Fix Agent
# =============================================================================
#
# PURPOSE
# -------
# Semi-automated recovery for failed task workers. When a task worker fails
# (timeout, code errors, conflict resolution failure), a human or automation
# can comment `/agents fix [model] [reasoning]` on the failed task issue to
# retry — this time with visibility into the prior partial branch and failure
# context.
#
# SEPARATION OF CONCERNS
# ----------------------
# Same pattern as claude-task.yml:
#
# Deterministic (bash):
#   - Find base branch and existing partial branch from issue comments
#   - Checkout existing branch (or base branch if no prior attempt)
#   - Fetch issue spec to /tmp/task-spec.md
#   - Fetch failure context to /tmp/failure-context.md
#   - Commit and push whatever the agent wrote
#   - Create or reuse PR
#   - Merge PR
#   - Trigger feature orchestrator
#   - Notify result
#
# LLM (Claude agent):
#   - Read the spec AND the failure context
#   - Read the existing partial code (if any)
#   - Fix or complete the implementation using Write/Edit tools
#   - Nothing else: no git, no PR, no GitHub API calls
#
# TRIGGERS
# --------
# - issue_comment with `/agents fix [model] [reasoning]` on a non-feature
#   issue. Accepts optional model + reasoning args just like `/agents plan`.
#
# TIMEOUT: 60 minutes
# =============================================================================

name: Claude Fix Agent

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write  # required to call `gh workflow run` on the feature workflow

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    if: >
      startsWith(github.event.comment.body, '/agents fix')
      && !contains(toJSON(github.event.issue.labels.*.name), 'feature')

    steps:
      # --- Checkout early so parse-directive.sh is available ---
      - name: Checkout repository (shallow, for the parser script)
        uses: actions/checkout@v4

      # --- Parse /agents fix directive (model + reasoning) ---
      - name: Parse directive
        id: directive
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: .github/scripts/parse-directive.sh >> "$GITHUB_OUTPUT"

      # --- React 👀 on the trigger comment ---
      - name: React — started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/react.sh "${{ github.event.comment.id }}" eyes

      # --- Gather context from issue history (deterministic) ---
      - name: Extract context
        id: feature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Find base branch from orchestrator's original assignment comment
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/comments" --jq '.[].body')
          BASE_BRANCH=$(echo "$COMMENTS" | grep -oP 'Base branch: `\K[^`]+' | tail -1 || echo "main")
          FEATURE_NUM=$(echo "$BASE_BRANCH" | grep -oP '\d+' || echo "0")

          # Find existing partial branch pushed by the failed task worker
          EXISTING_BRANCH=$(gh api "repos/${{ github.repository }}/git/matching-refs/heads/claude/" \
            --jq "[.[].ref | select(contains(\"issue-${ISSUE_NUM}-\"))] | sort | last // empty" \
            | sed 's|refs/heads/||' 2>/dev/null || echo "")

          # Get the last failed run ID for log reference
          FAILED_RUN=$(gh run list --workflow=claude-task.yml --status=failure --limit=5 --json databaseId,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[0].databaseId' 2>/dev/null || echo "")

          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "feature_number=$FEATURE_NUM" >> "$GITHUB_OUTPUT"
          echo "existing_branch=$EXISTING_BRANCH" >> "$GITHUB_OUTPUT"
          echo "failed_run=$FAILED_RUN" >> "$GITHUB_OUTPUT"

          echo "Base branch: $BASE_BRANCH"
          echo "Existing partial branch: ${EXISTING_BRANCH:-none}"
          echo "Last failed run: ${FAILED_RUN:-none}"

      # --- Checkout existing partial branch, or base branch if none ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.feature.outputs.existing_branch || steps.feature.outputs.base_branch }}
          fetch-depth: 0

      # --- Prepare task branch and context files (deterministic) ---
      - name: Prepare branch and context
        id: prep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEATURE_NUM: ${{ steps.feature.outputs.feature_number }}
          ISSUE_NUM: ${{ steps.feature.outputs.issue_number }}
          EXISTING_BRANCH: ${{ steps.feature.outputs.existing_branch }}
          BASE_BRANCH: ${{ steps.feature.outputs.base_branch }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [[ -n "$EXISTING_BRANCH" ]]; then
            # Continue on the existing partial branch
            TASK_BRANCH="$EXISTING_BRANCH"
            echo "Continuing existing branch: $TASK_BRANCH"
          else
            # No prior attempt — create a fresh branch from the base
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            TASK_BRANCH="claude/${FEATURE_NUM}-issue-${ISSUE_NUM}-fix-${TIMESTAMP}"
            git checkout -b "$TASK_BRANCH"
            echo "Created new branch: $TASK_BRANCH"
          fi

          # Fetch issue body (the spec) to a local file
          gh issue view "$ISSUE_NUM" --json title,body \
            --jq '"# " + .title + "\n\n" + .body' > /tmp/task-spec.md

          # Fetch the last ~10 comments for failure context
          gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/comments" \
            --jq '[.[] | {author: .user.login, body: .body}] | .[-10:] | .[] | "## " + .author + "\n\n" + .body + "\n\n---\n"' \
            > /tmp/failure-context.md

          echo "task_branch=$TASK_BRANCH" >> "$GITHUB_OUTPUT"

          echo "--- Spec ---"
          cat /tmp/task-spec.md
          echo "--- Failure context (last 10 comments) ---"
          cat /tmp/failure-context.md
          echo "--- End ---"

      # --- Load prompt from .github/prompts/ ---
      - name: Load prompt
        run: |
          DELIM="___CLAUDE_PROMPT_EOF___"
          {
            echo "FIX_PROMPT<<$DELIM"
            cat .github/prompts/fix-agent.md
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      # --- Run the Claude fix agent (LLM only writes code) ---
      - name: Run Claude Fix Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model ${{ steps.directive.outputs.model }} --allowedTools Read,Glob,Grep,Write,Edit,Bash"
          allowed_bots: "claude[bot],github-actions[bot]"
          prompt: ${{ env.FIX_PROMPT }}

      # --- Commit and push (deterministic) ---
      - name: Commit and push task branch
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.feature.outputs.issue_number }}
          TASK_BRANCH: ${{ steps.prep.outputs.task_branch }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Re-auth the remote (claude-code-action revokes credentials)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          git add -A
          if git diff --cached --quiet; then
            echo "::warning::Agent made no changes on top of existing branch"
            # Not necessarily a failure — the existing branch might already have the fix
            # Only fail if there's also no prior commit
            if ! git log --oneline -1 &>/dev/null; then
              echo "::error::No changes and no prior commits"
              exit 1
            fi
          else
            git commit -m "Fix implementation for issue #${ISSUE_NUM}"
          fi

          git push -u origin "$TASK_BRANCH"
          echo "Pushed $TASK_BRANCH"

      # --- Create PR (if none) and merge ---
      - name: Create or merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.feature.outputs.issue_number }}
          BASE_BRANCH: ${{ steps.feature.outputs.base_branch }}
          TASK_BRANCH: ${{ steps.prep.outputs.task_branch }}
        run: |
          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$TASK_BRANCH" --base "$BASE_BRANCH" --json number --jq '.[0].number // empty')

          if [[ -n "$EXISTING" ]]; then
            PR_NUM="$EXISTING"
            echo "Reusing existing PR #$PR_NUM"
          else
            TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
            PR_URL=$(gh pr create \
              --base "$BASE_BRANCH" \
              --head "$TASK_BRANCH" \
              --title "$TITLE" \
              --body "fixes #${ISSUE_NUM}")
            PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
            echo "Created PR #$PR_NUM"
          fi

          # Try direct merge
          if gh pr merge "$PR_NUM" --merge 2>/dev/null; then
            echo "PR #$PR_NUM merged successfully"
            exit 0
          fi

          echo "Direct merge failed, attempting merge via API..."
          gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/merge" \
            -X PUT -f merge_method=merge 2>/dev/null && {
            echo "PR #$PR_NUM merged via API"
            exit 0
          }

          echo "::error::Merge failed — PR may need manual conflict resolution"
          exit 1

      # --- Trigger feature to continue the loop ---
      - name: Trigger feature to continue loop
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEATURE_NUM: ${{ steps.feature.outputs.feature_number }}
        run: |
          if [ "$FEATURE_NUM" != "0" ] && [ -n "$FEATURE_NUM" ]; then
            gh workflow run claude-feature.yml -f feature_issue="$FEATURE_NUM"
            echo "Triggered feature workflow for issue #$FEATURE_NUM"
          fi

      # --- Always notify the result ---
      - name: Notify fix result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.feature.outputs.issue_number }}
          FEATURE_NUM: ${{ steps.feature.outputs.feature_number }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            gh issue comment "$ISSUE_NUM" --body "✅ **Fix agent succeeded.** [View run](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})"
          else
            gh issue comment "$ISSUE_NUM" --body "❌ **Fix agent also failed.** [View run](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) — Manual intervention may be needed."
            if [ "$FEATURE_NUM" != "0" ]; then
              gh issue comment "$FEATURE_NUM" --body "❌ **Fix agent failed** on issue #${ISSUE_NUM}. [View run](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) — Manual intervention needed."
            fi
          fi

      # --- React 👍 / 😕 on the trigger comment based on outcome ---
      - name: React — outcome
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            .github/scripts/react.sh "${{ github.event.comment.id }}" +1
          else
            .github/scripts/react.sh "${{ github.event.comment.id }}" confused
          fi
