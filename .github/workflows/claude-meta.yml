# =============================================================================
# Claude Meta Orchestrator (Deterministic)
# =============================================================================
#
# PURPOSE
# -------
# Advances a meta issue implementation plan. Reads the plan from a YAML block
# in the meta issue body, checks merged PRs, updates checkboxes, assigns the
# next ready wave of tasks, and opens the final PR when everything is done.
#
# REFACTORED: previous version used an LLM for orchestration logic, which was
# probabilistic and occasionally misread wave structure or failed to update
# checkboxes correctly. This version is ENTIRELY DETERMINISTIC — a bash script
# does all the orchestration. The only LLM calls in the full agentic loop are
# in the task worker and fix agent (which do actual implementation work).
#
# TRIGGERS
# --------
# 1. issue_comment — @claude comment on a meta-labeled issue (kickstart / retry)
# 2. issues assigned — someone assigns a meta-labeled issue (UX alternative to commenting)
# 3. pull_request closed — human merges a PR into meta/* (fallback; GITHUB_TOKEN merges are silent)
# 4. workflow_dispatch — called by task worker post-step after a successful merge (primary loop mechanism)
#
# BENEFITS vs the LLM version
# ---------------------------
# - Runs in seconds instead of minutes
# - Costs $0 (no API calls)
# - 100% deterministic behavior
# - Easy to debug and reproduce
# - Idempotent by construction (state is derived from GitHub, not inferred)
#
# SCRIPT: .github/scripts/meta-orchestrate.sh
# =============================================================================

name: Claude Meta Orchestrator

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write  # required to call `gh workflow run` (used by task worker loop closure)

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]
  issues:
    types: [assigned]
  workflow_dispatch:
    inputs:
      meta_issue:
        description: 'Meta issue number to orchestrate'
        required: true
        type: string

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # deterministic script, should finish in seconds

    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && startsWith(github.event.pull_request.base.ref, 'meta/'))
      || (github.event_name == 'issue_comment'
          && contains(github.event.comment.body, '@claude')
          && contains(toJSON(github.event.issue.labels.*.name), 'meta'))
      || (github.event_name == 'issues'
          && github.event.action == 'assigned'
          && contains(toJSON(github.event.issue.labels.*.name), 'meta'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run meta orchestrator script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          META_INPUT: ${{ github.event.inputs.meta_issue }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: ./.github/scripts/meta-orchestrate.sh
