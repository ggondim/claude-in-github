# =============================================================================
# Claude Feature Orchestrator (Deterministic)
# =============================================================================
#
# PURPOSE
# -------
# Advances a feature issue implementation plan. Reads the plan from a YAML block
# in the feature issue body, checks merged PRs, updates checkboxes, assigns the
# next ready wave of tasks, and opens the final PR when everything is done.
#
# REFACTORED: previous version used an LLM for orchestration logic, which was
# probabilistic and occasionally misread wave structure or failed to update
# checkboxes correctly. This version is ENTIRELY DETERMINISTIC — a bash script
# does all the orchestration. The only LLM calls in the full agentic loop are
# in the task worker and fix agent (which do actual implementation work).
#
# TRIGGERS
# --------
# 1. issue_comment — `/agents start [model] [reasoning]` on a feature-labeled
#    issue (kickstart / retry). Accepts optional model + reasoning args that
#    are propagated to downstream task workers via workflow_dispatch inputs.
# 2. issues assigned — someone assigns a feature-labeled issue (UX alternative)
# 3. pull_request closed — human merges a PR into feature/* (fallback;
#    GITHUB_TOKEN merges are silent)
# 4. workflow_dispatch — called by task worker post-step after a successful
#    merge (primary loop mechanism)
#
# BENEFITS vs the LLM version
# ---------------------------
# - Runs in seconds instead of minutes
# - Costs $0 (no API calls)
# - 100% deterministic behavior
# - Easy to debug and reproduce
# - Idempotent by construction (state is derived from GitHub, not inferred)
#
# SCRIPT: .github/scripts/feature-orchestrate.sh
# =============================================================================

name: Claude Feature Orchestrator

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write  # required to call `gh workflow run` (used by task worker loop closure)

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]
  issues:
    types: [assigned]
  workflow_dispatch:
    inputs:
      feature_issue:
        description: 'Feature issue number to orchestrate'
        required: true
        type: string

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # deterministic script, should finish in seconds

    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && startsWith(github.event.pull_request.base.ref, 'feature/'))
      || (github.event_name == 'issue_comment'
          && startsWith(github.event.comment.body, '/agents start')
          && contains(toJSON(github.event.issue.labels.*.name), 'feature'))
      || (github.event_name == 'issues'
          && github.event.action == 'assigned'
          && contains(toJSON(github.event.issue.labels.*.name), 'feature'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Parse /agents start directive so task workers can inherit model/reasoning ---
      - name: Parse directive
        id: directive
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: .github/scripts/parse-directive.sh >> "$GITHUB_OUTPUT"

      # --- React 👀 on the trigger comment (issue_comment only) ---
      - name: React — started
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/react.sh "${{ github.event.comment.id }}" eyes

      - name: Run feature orchestrator script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          FEATURE_INPUT: ${{ github.event.inputs.feature_issue }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          WORKER_MODEL: ${{ steps.directive.outputs.model }}
          WORKER_REASONING: ${{ steps.directive.outputs.reasoning }}
        run: ./.github/scripts/feature-orchestrate.sh

      # --- React 👍 / 😕 on the trigger comment based on outcome ---
      - name: React — outcome
        if: always() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            .github/scripts/react.sh "${{ github.event.comment.id }}" +1
          else
            .github/scripts/react.sh "${{ github.event.comment.id }}" confused
          fi
